name: PR Checks

on:
  push:
    branches:
      - '!main'
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Link and Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/workflows/setup
      - run: pnpm format:check
      - run: pnpm lint:check
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Environment setup
        uses: ./.github/workflows/setup
      - name: Run tests
        run: pnpm test
